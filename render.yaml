services:
  # ─── 1. Java Spring Boot Backend (Docker) ─────────────────────────────────
  - type: web
    name: complaintdesk-api
    env: docker
    region: singapore
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # ─── 2. HTML Dashboard Frontend (Static Site) ─────────────────────────────
  - type: web
    name: complaintdesk-ui
    env: static
    region: singapore
    plan: free
    rootDir: dashboard
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
